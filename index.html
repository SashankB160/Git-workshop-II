<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, sans-serif;
      --bg-start: #0b1e3a;
      --bg-end: #0f3d6e;
      --card: rgba(255, 255, 255, 0.08);
      --accent: #7dd3fc;
      --accent-strong: #60a5fa;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --border: rgba(148, 163, 184, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, rgba(96, 165, 250, 0.25), transparent 30%),
                  linear-gradient(180deg, var(--bg-start), var(--bg-end));
      color: var(--text-primary);
    }

    .container {
      width: min(460px, calc(100% - 32px));
      padding: 28px;
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 40px 120px rgba(15, 23, 42, 0.45);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 220px;
      height: 220px;
      background: rgba(96, 165, 250, 0.16);
      border-radius: 50%;
      filter: blur(26px);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    .header p {
      margin: 8px 0 0;
      color: var(--accent);
      font-size: 0.95rem;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 16px;
    }

    .search-row input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
    }

    .search-row input::placeholder {
      color: rgba(203, 213, 225, 0.65);
    }

    .search-row button {
      border: none;
      border-radius: 18px;
      padding: 16px 20px;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .search-row button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(59, 130, 246, 0.2);
    }

    .weather-card {
      margin-top: 28px;
      padding: 26px;
      border-radius: 32px;
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.14);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 1;
    }

    .weather-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .weather-top .temp {
      font-size: 4rem;
      margin: 0;
      line-height: 0.9;
    }

    .weather-top .status {
      text-align: right;
    }

    .weather-top .status strong {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .weather-top .status span {
      display: block;
      color: var(--accent);
      font-size: 0.95rem;
    }

    .weather-grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .weather-grid .stat {
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(148, 163, 184, 0.12);
      text-align: center;
      color: var(--text-secondary);
    }

    .weather-grid .stat strong {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .note {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(34, 197, 94, 0.12);
      color: #d1fae5;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1>Weather</h1>
      <p>Check the current forecast for any city.</p>
    </div>
  </div>

  <div class="search-row">
    <input type="text" id="city" placeholder="Search city" />
    <button onclick="getWeather()">Search</button>
  </div>

  <div id="weatherResult" class="weather-card">
    <div class="weather-top">
      <p class="temp">11°C</p>
      <div class="status">
        <strong>Alaska, US</strong>
        <span>Clear sky</span>
      </div>
    </div>

    <div class="weather-grid">
      <div class="stat">
        <strong>78%</strong>
        Humidity
      </div>
      <div class="stat">
        <strong>7 km/h</strong>
        Wind
      </div>
      <div class="stat">
        <strong>1018</strong>
        Pressure
      </div>
    </div>
  </div>
</div>

<script>
  const apiKey = "YOUR_API_KEY_HERE";

  const mockData = {
    alaska: {
      name: "Alaska",
      country: "US",
      temp: 11,
      description: "Clear sky",
      humidity: 78,
      wind: 7,
      pressure: 1018
    },
    london: {
      name: "London",
      country: "GB",
      temp: 14,
      description: "Light rain",
      humidity: 82,
      wind: 12,
      pressure: 1012
    },
    tokyo: {
      name: "Tokyo",
      country: "JP",
      temp: 22,
      description: "Partly cloudy",
      humidity: 68,
      wind: 9,
      pressure: 1016
    },
    paris: {
      name: "Paris",
      country: "FR",
      temp: 18,
      description: "Sunny",
      humidity: 55,
      wind: 8,
      pressure: 1014
    }
  };

  function getMockWeather(city) {
    const key = city.trim().toLowerCase();
    return mockData[key] || {
      name: city,
      country: "US",
      temp: 11,
      description: "Clear sky",
      humidity: 75,
      wind: 6,
      pressure: 1015,
      note: "Using mock weather data because the city could not be fetched."
    };
  }

  function renderWeather(weather, isMock = false) {
    const note = isMock ? `<div class="note">${weather.note || `Showing mock weather for ${weather.name}.`}</div>` : "";

    document.getElementById("weatherResult").innerHTML = `
      <div class="weather-top">
        <p class="temp">${Math.round(weather.temp)}°C</p>
        <div class="status">
          <strong>${weather.name}, ${weather.country}</strong>
          <span>${weather.description}</span>
        </div>
      </div>

      <div class="weather-grid">
        <div class="stat">
          <strong>${weather.humidity}%</strong>
          Humidity
        </div>
        <div class="stat">
          <strong>${weather.wind} km/h</strong>
          Wind
        </div>
        <div class="stat">
          <strong>${weather.pressure}</strong>
          Pressure
        </div>
      </div>

      ${note}
    `;
  }

  async function getWeather() {
    const city = document.getElementById("city").value.trim();

    if (!city) {
      alert("Please enter a city name.");
      return;
    }

    const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`;

    try {
      const response = await fetch(url);
      const data = await response.json();

      if (!response.ok || data.cod !== 200) {
        const mockWeather = getMockWeather(city);
        renderWeather(mockWeather, true);
        return;
      }

      const weather = {
        name: data.name,
        country: data.sys.country,
        temp: data.main.temp,
        description: data.weather[0].description,
        humidity: data.main.humidity,
        wind: Math.round(data.wind.speed * 3.6),
        pressure: data.main.pressure
      };

      renderWeather(weather);
    } catch (error) {
      const mockWeather = getMockWeather(city);
      renderWeather(mockWeather, true);
    }
  }
</script>

</body>
</html>
